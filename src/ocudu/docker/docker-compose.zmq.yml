# [radr] Single-cell ZeroMQ end-to-end test stack (gNB + 5GC) for OCUDU.
#
# Pulled from the srsRAN-docker gnb-zmq-single-cell setup and adapted to the
# OCUDU layout. The Open5GS service is reused verbatim from the base
# docker-compose.yml (same build context / env / command / version) — no
# Open5GS config is changed here; only the network wiring differs.
#
# The n2 / n3 / metrics networks are EXTERNAL — create them first with:
#   ./scripts/net_manage.sh init
# The UE side lives in multi_ue/ (on ue_n3 + metrics); start it separately
# (see multi_ue/README.md). Do not run the base docker-compose.yml at the same
# time — both define the 5gc/gnb services.

services:
  5gc:
    container_name: open5gs_5gc
    image: rptestbed/docker-5gc:11062026
    build:
      context: open5gs
      target: open5gs
      args:
        OS_VERSION: "22.04"
        OPEN5GS_VERSION: "v2.7.6"
    env_file:
      - ${OPEN_5GS_ENV_FILE:-open5gs/open5gs.env}
    privileged: true
    ports:
      - "9999:9999/tcp"
    command: 5gc -c open5gs-5gc.yml
    volumes:
      - ./open5gs/subscriber_db.csv:/open5gs/subscriber_db.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.20 7777"]
      interval: 3s
      timeout: 1s
      retries: 60
    networks:
      # N2 (control plane) — same 10.53.1.2 the gNB targets as the AMF.
      n2:
        ipv4_address: ${OPEN5GS_IP:-10.53.1.2}
      # default bridge for N6 / internet egress (UPF NAT).
      default:

  gnb:
    container_name: ocudu_gnb
    image: rptestbed/docker-gnb:11062026
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        OS: ${OS:-ubuntu}
        OS_VERSION: ${OS_VERSION:-26.04}
        # [radr] Enable ZeroMQ RF driver for end-to-end ZMQ testing
        ENABLE_ZEROMQ: "On"
        # [radr] Target CPU ISA. MUST be <= the test machine's CPU, or the gNB
        # crashes with SIGILL (exit 132) once PHY/DSP runs. Do NOT build with
        # -march=native on a newer build host. Testbed is Cascade Lake (x86-64-v4).
        MARCH: ${MARCH:-x86-64-v4}
    privileged: true
    cap_add:
      - SYS_NICE
      - CAP_SYS_PTRACE
    volumes:
      # Access USB to use some SDRs (harmless for ZMQ)
      - /dev/bus/usb/:/dev/bus/usb/
      - /usr/share/uhd/images:/usr/share/uhd/images
      # ZMQ RF gNB config + compose overlay (from ../configs)
      - ${GNB_ZMQ_CONFIG_PATH:-../configs/gnb_zmq.yml}:/gnb_config.yml:ro
      - ../configs/gnb_zmq_compose_config.yml:/gnb_compose_config.yml:ro
      - gnb-storage:/tmp
    command: gnb -c /gnb_config.yml -c /gnb_compose_config.yml
    depends_on:
      5gc:
        condition: service_healthy
    networks:
      n2:
        ipv4_address: ${GNB_N2_IP:-10.53.1.3}
      n3:
        ipv4_address: ${GNB_N3_IP:-10.10.3.231}
      metrics:
        ipv4_address: 172.19.1.3

volumes:
  gnb-storage:

networks:
  n2:
    external: true
    name: n2
  n3:
    external: true
    name: n3
  metrics:
    external: true
    name: metrics
