# ─────────────────────────────────────────────────────────────────────────────
# gNB — ZMQ (virtual RF). Docker-network only: publishes NO host ports.
#
#   n2          -> NGAP + NG-U GTP-U to the 5GC (open5gs_5gc on n2)
#   n3          -> ZMQ RF transport to ue/multi_ue (tx 2000 / rx 2001)
#   oran-sc-ric -> E2 to the RIC (e2term)
#   metrics     -> telemetry to telegraf/influx
#
# The 5GC + RIC are started separately (manage.sh) and reached over the shared
# bridges; nothing here is exposed on the host. Extra/remote gNBs instead use the
# 5GC/RIC published host ports.
# ─────────────────────────────────────────────────────────────────────────────

services:
  gnb:
    container_name: ocudu_gnb
    image: ${GNB_IMAGE:-rptestbed/gnb:20260610-dpdk}
    pull_policy: if_not_present
    privileged: true
    cap_add:
      - SYS_NICE
      - CAP_SYS_PTRACE
    volumes:
      - ./configs/gnb_zmq.yml:/gnb_config.yml:ro
      - ./configs/gnb_zmq_compose_config.yml:/gnb_compose_config.yml:ro
      - gnb-storage:/tmp
    command: gnb -c /gnb_config.yml -c /gnb_compose_config.yml
    networks:
      n2:
        ipv4_address: ${GNB_N2_IP:-10.53.1.3}
      n3:
        ipv4_address: ${GNB_N3_IP:-10.10.3.231}
      oran-sc-ric:
        ipv4_address: ${GNB_RIC_IP:-10.0.2.25}
      metrics:
        ipv4_address: ${GNB_METRICS_IP:-172.19.1.3}

volumes:
  gnb-storage:

networks:
  n2:
    external: true
    name: n2
  n3:
    external: true
    name: n3
  oran-sc-ric:
    external: true
    name: oran-sc-ric
  metrics:
    external: true
    name: metrics
