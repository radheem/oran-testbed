# UHD gNB configuration (physical USRP B210).
#
# AMF/E2 wiring matches the cudu-deploy bridge model:
#   amf.addrs       = 5GC on n2 (OPEN5GS_IP)
#   amf.bind_addrs  = this gNB on n2 (GNB_N2_IP)
#   e2.addr         = RIC e2term on the oran-sc-ric network
#   e2.bind_addr    = this gNB on the oran-sc-ric network (GNB_RIC_IP)

cu_cp:
  amf:
    # Plural addrs/bind_addrs: OCUDU schema (rptestbed/docker-gnb image).
    addrs: 10.53.1.2
    port: 38412
    bind_addrs: 10.53.1.3
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1
              # For a handset that requests a custom SD (e.g. 0x111111), add `sd:`
              # here AND on the subscriber in the WebUI (:9999). See docs/SETUP.md.
  inactivity_timer: 7200

ru_sdr:
  # Use UHD with the connected B210 SDR. SET device_args serial= to your unit
  # (find it with `uhd_find_devices`).
  device_driver: uhd
  device_args: type=b200,serial=CHANGE_ME,num_recv_frames=64,num_send_frames=64
  srate: 23.04
  tx_gain: 70
  rx_gain: 40

cell_cfg:
  dl_arfcn: 632628
  band: 78
  channel_bandwidth_MHz: 20
  common_scs: 30
  plmn: "00101"
  tac: 7
  pci: 1
  slicing:
    - sst: 1

log:
  filename: /tmp/gnb.log
  all_level: info

pcap:
  mac_enable: false
  mac_filename: /tmp/gnb_mac.pcap
  ngap_enable: false
  ngap_filename: /tmp/gnb_ngap.pcap
  e2ap_enable: true
  e2ap_du_filename: /tmp/gnb_du_e2ap.pcap
  e2ap_cu_cp_filename: /tmp/gnb_cu_cp_e2ap.pcap
  e2ap_cu_up_filename: /tmp/gnb_cu_up_e2ap.pcap

# E2 to the ORAN-SC RIC. e2sm_ccc_enabled MUST stay false (DU E2-setup / KPM).
e2:
  enable_du_e2: true
  enable_cu_cp_e2: true
  enable_cu_up_e2: true
  e2sm_kpm_enabled: true
  e2sm_rc_enabled: true
  e2sm_ccc_enabled: false
  addrs: 10.0.2.10
  bind_addrs: 10.0.2.25
  port: 36421
